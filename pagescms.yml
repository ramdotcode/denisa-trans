collections:
  - name: perusahaan
    label: "🏢 Profil Perusahaan"
    type: file
    path: data/perusahaan.json
    fields:
      - {name: nama, label: "Nama Travel", type: string}
      - {name: tagline, label: "Tagline (Hero Text)", type: string}
      - {name: whatsapp, label: "Nomor WhatsApp (62...)", type: string}
      - {name: email, label: "Email", type: string}
      - {name: alamat, label: "Alamat", type: string}

  - name: layanan
    label: "🚐 Daftar Layanan"
    type: list
    path: data/layanan.json
    fields:
      - {name: nama, label: "Nama Layanan", type: string}
      - {name: deskripsi, label: "Deskripsi", type: text}
      - {name: icon, label: "Icon (FontAwesome)", type: string}
      - {name: link, label: "Link Page", type: string}

  - name: rute
    label: "🛣️ Daftar Rute"
    type: list
    path: data/rute.json
    fields:
      - {name: asal, label: "Dari", type: string}
      - {name: tujuan, label: "Tujuan", type: string}
      - {name: harga, label: "Harga", type: string}
      - {name: keterangan, label: "Keterangan", type: string}
